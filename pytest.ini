[pytest]
testpaths =
    backend/tests
    agent/tests
addopts =
    -ra
    --strict-config
    --strict-markers
    --junitxml=reports/pytest-junit.xml
    --cov=backend
    --cov=agent
    --cov-report=term-missing
    --cov-report=xml:reports/coverage.xml
markers =
    performance: performance and load tests

